# Sets the number of worker processes; 'auto' is a good default.
worker_processes auto;

events {
    # The maximum number of simultaneous connections that can be opened by a worker process.
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    types {
        application/javascript mjs;
    }

    # General performance and security settings
    sendfile        on;
    keepalive_timeout  65;
    # It's good practice to hide the Nginx version number.
    server_tokens      off;

    # =================================================================
    #  1. Upstream Service Definitions
    # =================================================================
    # Using upstream blocks is a great practice for organization and load balancing.

    upstream auth_backend {
        # Points to the service defined in your docker-compose.yml
        server auth:8000;
    }
    upstream chat_backend {
        server chat:8000;
    }
    upstream fraud_backend {
        server fraud:8000;
    }
    upstream socket_backend {
        # Note: You have this as port 5000, ensure this matches your service's Dockerfile/config.
        server socket_gateway:5000;
    }
    upstream push_notification_backend {
        server push_notification:8000;
    }
    upstream www_backend {
        server www:8000;
    }

    # =================================================================
    #  2. Main Server Block (The Router)
    # =================================================================
    server {
        listen 80;
        server_name localhost; # Replace with your domain in production

        # --- Location for Web Interface (Flutter Frontend) ---
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Required for Flutter WASM multithreading
            add_header Cross-Origin-Opener-Policy same-origin always;
            add_header Cross-Origin-Embedder-Policy credentialless always;

            # Optional but recommended
            add_header Cross-Origin-Resource-Policy same-origin always;
        }

        # --- Location for Web Interface (www service) ---
        location /web/ {
            proxy_pass http://www_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Location for Public Authentication ---
        location /auth/ {
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # CORS headers for cross-origin requests
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        }

        # --- Location for Authenticated REST APIs ---
        # This acts as a parent block for all /api/ traffic.
        location /api/ {
            # Step 1: All requests to /api/ must first be validated.
            auth_request /_validate_token;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $username $upstream_http_x_username;

            # Step 3: Inject headers into backend request
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-Username $username;
            # Pass the installation ID from the client's request for API calls too.
            proxy_set_header X-Installation-ID $http_x_installation_id;
            # Standard proxy headers for all API services
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header Authorization $http_authorization;
            # proxy_set_header X-My-Custom-Header "hello";

            # CORS headers for cross-origin requests
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";

            # Using nested locations to route specific API calls
            location /api/chat/ {
                proxy_pass http://chat_backend;
                # CRITICAL: Disable buffering for any streaming responses from this service.
                proxy_buffering off;
            }
            location /api/fraud/ {
                proxy_pass http://fraud_backend;
                # CRITICAL: Disable buffering for any streaming responses from this service.
                proxy_buffering off;
            }
            location /api/food-recognition/ {
                proxy_pass http://chat_backend;
                # Allow larger file uploads for images
                client_max_body_size 50M;
            }
            location /api/push/ {
                proxy_pass http://push_notification_backend;
            }
        }

        # --- Location for Authenticated Real-Time Connections ---
        # Commented out socket.io support - enable when socket_gateway service is available
        location /socket.io/ {
            # Step 1: Validate the token during the initial HTTP handshake.
            # auth_request /_validate_token_socket_io;
        
            # Step 2: Extract user info from the auth response.
            # auth_request_set $user_id $upstream_http_x_user_id;
            # auth_request_set $username $upstream_http_x_username;

            # Step 3: Pass the trusted user ID to your socket_gateway.
            # proxy_set_header X-User-ID $user_id;
            # proxy_set_header X-Username $username;
            # Pass the installation ID from the client's request.
            # $http_x_installation_id reads the 'X-Installation-ID' header from the incoming request.
            # proxy_set_header X-Installation-ID $http_x_installation_id;

            # Pass the connection to the socket_gateway service.
            proxy_pass http://socket_backend;

            # These headers are ESSENTIAL for the WebSocket upgrade to succeed.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # CORS headers for all requests
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        }

        # --- Internal-Only Location for Token Validation ---
        location = /_validate_token {
            internal; # This location cannot be accessed from the outside world.
            proxy_pass_request_body off;
            client_max_body_size 50M;
            proxy_pass http://auth_backend/auth/validate;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization; # Pass the JWT to the auth service
        }

        # --- Custom Error Handling for Authentication Failures ---
        error_page 401 403 = @unauthorized;
        location @unauthorized {
            # Provides a consistent JSON error response on auth failure.
            default_type application/json;
            return 401 '{"status": "error", "message": "Unauthorized: Invalid or missing token."}';

            # CORS headers for error responses
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        }
    }
}
