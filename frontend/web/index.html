<!-- web/index.html -->
<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="Fraud Detect App">
  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FraudDetect">
  <meta name="theme-color" content="#439293"> 
  <link rel="apple-touch-icon" href="assets/image/logo.png">
  <link rel="icon" type="image/png" href="assets/image/logo.png"/>
  <title>Fraud Detect App</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      deferredPrompt = e;
    });

    function promptInstall(){
       deferredPrompt.prompt();
    }

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
    });

    function getLaunchMode() {
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      if(deferredPrompt) hasPrompt();
      if (document.referrer.startsWith('android-app://')) {
        appLaunchedAsTWA();
      } else if (navigator.standalone || isStandalone) {
        appLaunchedAsPWA();
      } else {
        window.appLaunchedInBrowser();
      }
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
