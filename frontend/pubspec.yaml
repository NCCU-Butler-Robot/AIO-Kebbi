name: fraud_detect_app
description: A new Flutter project.
publish_to: 'none'

version: 1.0.1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.0.0            
  google_fonts: ^8.0.0
  dropdown_button2: ^3.0.0
  dio: ^5.9.0
  flutter_secure_storage: ^10.0.0
  provider: ^6.1.5
  web_socket_channel: ^3.0.3
  audioplayers: ^6.5.0
  vibration: ^3.1.3
  record: ^6.0.0
  permission_handler: ^12.0.1
  flutter_sound: ^9.28.0
  path_provider: ^2.1.5
  get_it: ^9.2.1
  image_picker: ^1.0.7
  camera: ^0.12.0
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.0
  vosk_flutter: ^0.3.0

dependency_overrides:
  # vosk_flutter pins older versions; override to match app requirements
  permission_handler: ^12.0.1
  http: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/filtered_terms.json
    - assets/image/logo.png
    - assets/image/logo_name.png
    - assets/image/Direct graph_1.png
    - assets/image/Direct graph_2.png
    - assets/image/Direct graph_3.png
    - assets/mock_call.json
    - assets/mock_seq.json
    - assets/sounds/alert.mp3
    - assets/sounds/Fraud.mp3
    - assets/sounds/Not_Fraud.mp3

  

